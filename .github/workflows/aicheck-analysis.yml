name: AICheck Analysis

on:
  workflow_dispatch:
  push:
  pull_request:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  analysis-step:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SOURCERY_TOKEN: ${{ secrets.SOURCERY_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: uv sync
            script: uv sync
            mock_vllm: false
          - name: ui generation check
            script: |
              uv run pyside6-uic src/views/ui/main_window.ui -o src/views/ui/main_window_ui.py
              test -f src/views/ui/main_window_ui.py
            mock_vllm: false
          - name: git ls-files
            script: git ls-files
            mock_vllm: false
          - name: mypy --strict
            script: uv run mypy --strict ./
            mock_vllm: false
          - name: pyright
            script: uv run pyright ./
            mock_vllm: false
          - name: sourcery review
            script: |
              if [ -z "$SOURCERY_TOKEN" ]; then
                echo "SOURCERY_TOKEN is not set; skipping Sourcery review."
                exit 0
              fi

              uv run sourcery login --token "$SOURCERY_TOKEN"
              uv run sourcery review ./
            mock_vllm: false
          - name: coverage
            script: |
              set +e
              uv run python -m coverage run --source=src -m unittest discover -s tests -p "test_*.py"
              run_status=$?
              uv run python -m coverage report -m --fail-under=80
              report_status=$?
              if [ "$run_status" -ne 0 ] || [ "$report_status" -ne 0 ]; then
                exit 1
              fi
            mock_vllm: false
          - name: pyinstrument integration
            script: uv run python -m pyinstrument src/main.py --nogui --nopause
            mock_vllm: true
          - name: SonarCloud status
            script: |
              uv run python - <<'PY'
              from __future__ import annotations

              import base64
              import json
              import os
              import urllib.error
              import urllib.request

              token = os.environ["SONAR_TOKEN"].strip()
              if not token:
                  raise RuntimeError("SONAR_TOKEN secret is empty")

              project_key = "handsome-Druid_AICheck"
              auth = base64.b64encode(f"{token}:".encode("ascii")).decode("ascii")
              headers = {"Authorization": f"Basic {auth}"}

              endpoints = [
                  ("SonarCloud project status", f"https://sonarcloud.io/api/qualitygates/project_status?projectKey={project_key}"),
                  ("SonarCloud measures", f"https://sonarcloud.io/api/measures/component?component={project_key}&metricKeys=bugs,vulnerabilities,code_smells,coverage,ncloc,security_hotspots"),
                  ("SonarCloud issues", f"https://sonarcloud.io/api/issues/search?componentKeys={project_key}&resolved=false&ps=100"),
              ]

              for title, endpoint in endpoints:
                  print(f"===== {title} =====")
                  request = urllib.request.Request(endpoint, headers=headers)
                  try:
                      with urllib.request.urlopen(request, timeout=30) as response:
                          payload = json.loads(response.read().decode("utf-8"))
                  except urllib.error.HTTPError as error:
                      print(json.dumps({"error": error.read().decode("utf-8", errors="replace")}, ensure_ascii=False, indent=2))
                      continue

                  print(json.dumps(payload, ensure_ascii=False, indent=2))
              PY
            mock_vllm: false
          - name: scc
            script: scc
            mock_vllm: false
            install_scc: true

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml

      - name: Install Python 3.14
        run: uv python install 3.14

      - name: Sync dependencies
        run: uv sync

      - name: Install system dependencies for Qt/PySide6
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1-mesa libgl1-mesa-glx libxkbcommon-x11-0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-shape0 libxcb-xinerama0

      - name: Set up Go for scc
        if: ${{ matrix.install_scc }}
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install scc
        if: ${{ matrix.install_scc }}
        run: go install github.com/boyter/scc/v3@latest

      - name: Generate mock vLLM fixtures
        if: ${{ matrix.mock_vllm }}
        run: |
          uv run python .github/scripts/ci_fixtures.py generate --output output/ci-fixtures --rows 1000 --seed "${{ github.run_id }}"
          printf '%s\n' 'mock fixtures prepared at output/ci-fixtures'

      - name: Generate mock vLLM certificate
        if: ${{ matrix.mock_vllm }}
        run: |
          openssl req -x509 -newkey rsa:2048 -nodes -days 1 \
            -keyout output/ci-fixtures/mock_server.key \
            -out output/ci-fixtures/mock_server.crt \
            -subj "/CN=127.0.0.1" \
            -addext "subjectAltName=DNS:localhost,IP:127.0.0.1"

      - name: Start mock vLLM container
        if: ${{ matrix.mock_vllm }}
        run: |
          docker run -d --name aicheck-mock-vllm -p 18080:18080 \
            -v "$GITHUB_WORKSPACE:/workspace" \
            python:3.14-slim \
            python /workspace/.github/scripts/ci_fixtures.py serve --manifest /workspace/output/ci-fixtures/mock_manifest.json --host 0.0.0.0 --port 18080 --cert /workspace/output/ci-fixtures/mock_server.crt --key /workspace/output/ci-fixtures/mock_server.key

      - name: Run step
        env:
          SSL_CERT_FILE: ${{ matrix.mock_vllm && format('{0}/output/ci-fixtures/mock_server.crt', github.workspace) || '' }}
        run: ${{ matrix.script }}

      - name: Stop mock vLLM container
        if: ${{ always() && matrix.mock_vllm }}
        run: docker rm -f aicheck-mock-vllm >/dev/null 2>&1 || true