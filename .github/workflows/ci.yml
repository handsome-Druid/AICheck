name: CI Pipeline

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  type-check:
    name: Type Check (mypy & pyright)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"
      - name: Install dependencies
        run: uv sync
      - name: Code Generation
        run: .venv\Scripts\pyside6-uic.exe ".\src\views\ui\main_window.ui" -o ".\src\views\ui\main_window_ui.py"
      - name: Type Check (mypy)
        run: .venv\Scripts\python.exe -m mypy --strict ./
      - name: Type Check (pyright)
        run: .venv\Scripts\python.exe -m pyright --pythonpath .venv\Scripts\python.exe ./

  test:
    name: Tests & Coverage
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"
      - name: Install dependencies
        run: uv sync
      - name: Code Generation
        run: .venv\Scripts\pyside6-uic.exe ".\src\views\ui\main_window.ui" -o ".\src\views\ui\main_window_ui.py"
      - name: Tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: .venv\Scripts\python.exe -m coverage run --source=src -m unittest discover -s tests -p "test_*.py"
      - name: Coverage Report
        run: .venv\Scripts\python.exe -m coverage report -m --fail-under=80

  profile:
    name: Pyinstrument Profile
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"
      - name: Install dependencies
        run: uv sync
      - name: Code Generation
        run: .venv\Scripts\pyside6-uic.exe ".\src\views\ui\main_window.ui" -o ".\src\views\ui\main_window_ui.py"
      - name: Pyinstrument Profile
        run: .venv\Scripts\python.exe -m pyinstrument src/main.py --nogui --nopause

  sonar:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # SonarCloud 对于分析的准确性需要完整的提交历史
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
